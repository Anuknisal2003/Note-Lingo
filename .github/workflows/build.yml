name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  # ──────────────────────────────────────────────
  #  Build release APK (Android)
  # ──────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Write google-services.json
        working-directory: note_lingo/android/app
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json

      - name: Write assets/.env
        working-directory: note_lingo
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > assets/.env
          echo "LOCAL_AI_BASE_URL=${{ secrets.LOCAL_AI_BASE_URL }}" >> assets/.env

      # ── Signing (add your own keystore to enable signed release) ──
      # Uncomment after uploading KEYSTORE_BASE64, KEYSTORE_PASSWORD,
      # KEY_ALIAS, KEY_PASSWORD to GitHub Secrets.
      #
      # - name: Decode keystore
      #   run: |
      #     echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > note_lingo/android/app/release.keystore
      #
      # - name: Write signing config
      #   working-directory: note_lingo/android
      #   run: |
      #     cat >> local.properties << EOF
      #     storeFile=release.keystore
      #     storePassword=${{ secrets.KEYSTORE_PASSWORD }}
      #     keyAlias=${{ secrets.KEY_ALIAS }}
      #     keyPassword=${{ secrets.KEY_PASSWORD }}
      #     EOF

      - name: Install Flutter dependencies
        working-directory: note_lingo
        run: flutter pub get

      - name: Build release APK
        working-directory: note_lingo
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ github.ref_name }}
          path: note_lingo/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # ── Optional: distribute via Firebase App Distribution ──────
      # Requires FIREBASE_APP_ID and FIREBASE_TOKEN secrets.
      # Add testers by comma-separated email in FIREBASE_TESTERS secret.
      #
      # - name: Distribute to Firebase App Distribution
      #   uses: wzieba/Firebase-Distribution-Github-Action@v1
      #   with:
      #     appId: ${{ secrets.FIREBASE_APP_ID }}
      #     token: ${{ secrets.FIREBASE_TOKEN }}
      #     groups: testers
      #     file: note_lingo/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      #     releaseNotes: "Release ${{ github.ref_name }}"

  # ──────────────────────────────────────────────
  #  GitHub Release (attach APKs to the tag)
  # ──────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks-${{ github.ref_name }}
          path: apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*.apk
          generate_release_notes: true
