name: note_lingo
description: "AI-powered note generation app with speech-to-text and summarization"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Firebase (all matched to firebase_core ^4.4.0) ──────────
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.3

  # ── State Management ─────────────────────────────────────────
  provider: ^6.1.2

  # ── Audio & Recording ────────────────────────────────────────
  record: ^5.2.0
  permission_handler: ^11.4.0

  # ── HTTP / AI ────────────────────────────────────────────────
  http: ^1.2.2

  # ── UI & Fonts ───────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # ── Export ───────────────────────────────────────────────────
  pdf: ^3.11.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  open_file: ^3.5.10

  # ── Utilities ────────────────────────────────────────────────
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  flutter_dotenv: ^5.2.1

  # ── Google Sign-In ───────────────────────────────────────────
  google_sign_in: ^6.2.2

  # ── Localizations ────────────────────────────────────────────
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/.env
